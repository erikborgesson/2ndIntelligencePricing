name: Blocket data collection
on:
     schedule:
       - cron: "5 14 13 7 *"
       - cron: "5 21 13 7 *"
     workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install blocket_api supabase
      - run: python blocket_scraper.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Notify on failure
        if: failure()
        run: echo "Scraper misslyckades -- GitHub skickar automatiskt ett mejl till repo-ägaren vid en röd körning."
